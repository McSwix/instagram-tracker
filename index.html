<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Follower Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .tab-active {
            border-bottom: 2px solid #8B5CF6;
            color: #8B5CF6;
        }
        .tab-inactive {
            color: #6B7280;
        }
        .tab-inactive:hover {
            color: #1F2937;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-50 min-h-screen">
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSxtt-88cp4vZlMQz3b1N0BsqNAcTwUyY",
            authDomain: "instagram-tracker-fda0e.firebaseapp.com",
            projectId: "instagram-tracker-fda0e",
            storageBucket: "instagram-tracker-fda0e.firebasestorage.app",
            messagingSenderId: "1021778226136",
            appId: "1:1021778226136:web:01920918c68410b9c6a0ad",
            measurementId: "G-W4RJW473HW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let followers = [];
        let following = [];
        let isLoaded = false;
        let activeTab = 'overview';
        let previousSnapshot = null;
        let changes = null;

        function parseFollowersFile(jsonData) {
            try {
                const data = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
                return data.map(item => ({
                    username: item.string_list_data[0]?.value,
                    href: item.string_list_data[0]?.href,
                    timestamp: item.string_list_data[0]?.timestamp
                })).filter(item => item.username);
            } catch (error) {
                console.error('Error parsing followers file:', error);
                alert('Error parsing followers file. Please make sure it is the correct format.');
                return [];
            }
        }

        function parseFollowingFile(jsonData) {
            try {
                const data = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
                const relationshipsFollowing = data.relationships_following || data;
                return relationshipsFollowing.map(item => ({
                    username: item.title,
                    href: item.string_list_data[0]?.href,
                    timestamp: item.string_list_data[0]?.timestamp
                })).filter(item => item.username);
            } catch (error) {
                console.error('Error parsing following file:', error);
                alert('Error parsing following file. Please make sure it is the correct format.');
                return [];
            }
        }

        async function saveSnapshot() {
            try {
                const snapshot = {
                    followers: followers.map(f => f.username),
                    following: following.map(f => f.username),
                    timestamp: new Date().toISOString(),
                    followerCount: followers.length,
                    followingCount: following.length
                };
                
                await addDoc(collection(db, "snapshots"), snapshot);
                console.log('Snapshot saved successfully');
            } catch (error) {
                console.error('Error saving snapshot:', error);
            }
        }

        async function loadPreviousSnapshot() {
            try {
                const q = query(collection(db, "snapshots"), orderBy("timestamp", "desc"), limit(2));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.docs.length >= 2) {
                    previousSnapshot = querySnapshot.docs[1].data();
                    calculateChanges();
                }
            } catch (error) {
                console.error('Error loading previous snapshot:', error);
            }
        }

        function calculateChanges() {
            if (!previousSnapshot) {
                changes = null;
                return;
            }

            const currentFollowers = new Set(followers.map(f => f.username));
            const previousFollowers = new Set(previousSnapshot.followers);
            const currentFollowing = new Set(following.map(f => f.username));
            const previousFollowing = new Set(previousSnapshot.following);

            const newFollowers = [...currentFollowers].filter(u => !previousFollowers.has(u));
            const unfollowers = [...previousFollowers].filter(u => !currentFollowers.has(u));
            const newFollowing = [...currentFollowing].filter(u => !previousFollowing.has(u));
            const unfollowed = [...previousFollowing].filter(u => !currentFollowing.has(u));

            changes = {
                newFollowers,
                unfollowers,
                newFollowing,
                unfollowed,
                followerChange: followers.length - previousSnapshot.followerCount,
                followingChange: following.length - previousSnapshot.followingCount
            };
        }

        async function handleFileUpload(event, fileType) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                if (fileType === 'followers') {
                    followers = parseFollowersFile(content);
                } else {
                    following = parseFollowingFile(content);
                }

                if (followers.length > 0 && following.length > 0) {
                    await loadPreviousSnapshot();
                    await saveSnapshot();
                    isLoaded = true;
                }
                render();
            };
            reader.readAsText(file);
        }

        function resetApp() {
            followers = [];
            following = [];
            isLoaded = false;
            activeTab = 'overview';
            previousSnapshot = null;
            changes = null;
            render();
        }

        function setTab(tab) {
            activeTab = tab;
            render();
        }

        function getAnalysis() {
            const followerUsernames = new Set(followers.map(f => f.username));
            const followingUsernames = new Set(following.map(f => f.username));

            return {
                notFollowingBack: following.filter(f => !followerUsernames.has(f.username)),
                notFollowedBack: followers.filter(f => !followingUsernames.has(f.username)),
                mutualFollowers: following.filter(f => followerUsernames.has(f.username))
            };
        }

        function renderUploadScreen() {
            return `
                <div class="p-8">
                    <div class="max-w-4xl mx-auto">
                        <div class="text-center mb-8">
                            <h1 class="text-4xl font-bold text-gray-800 mb-2">Instagram Follower Manager</h1>
                            <p class="text-gray-600">Upload your Instagram data files to get started</p>
                        </div>
                        
                        <div class="bg-white rounded-xl shadow-lg p-8">
                            <div class="space-y-6">
                                <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-purple-400 transition">
                                    <svg class="w-12 h-12 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                    </svg>
                                    <label class="block cursor-pointer">
                                        <span class="text-lg font-semibold text-gray-700">Upload followers_1.json</span>
                                        <p class="text-sm text-gray-500 mt-1">People who follow you</p>
                                        <input
                                            type="file"
                                            accept=".json"
                                            onchange="handleFileUpload(event, 'followers')"
                                            class="mt-4 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100 cursor-pointer"
                                        />
                                    </label>
                                    ${followers.length > 0 ? `<p class="text-green-600 mt-2 font-medium">✓ Loaded ${followers.length} followers</p>` : ''}
                                </div>

                                <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-pink-400 transition">
                                    <svg class="w-12 h-12 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                    </svg>
                                    <label class="block cursor-pointer">
                                        <span class="text-lg font-semibold text-gray-700">Upload following.json</span>
                                        <p class="text-sm text-gray-500 mt-1">People you follow</p>
                                        <input
                                            type="file"
                                            accept=".json"
                                            onchange="handleFileUpload(event, 'following')"
                                            class="mt-4 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100 cursor-pointer"
                                        />
                                    </label>
                                    ${following.length > 0 ? `<p class="text-green-600 mt-2 font-medium">✓ Loaded ${following.length} following</p>` : ''}
                                </div>
                            </div>

                            <div class="mt-6 p-4 bg-blue-50 rounded-lg">
                                <p class="text-sm text-blue-800">
                                    <strong>How to get your files:</strong> Go to Instagram Settings → Security → Download Your Information → Request Download (JSON format)
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStatCard(title, value, icon, color, change) {
            return `
                <div class="bg-white rounded-lg shadow p-6 border-l-4" style="border-left-color: ${color}">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm font-medium">${title}</p>
                            <p class="text-3xl font-bold mt-2">${value}</p>
                            ${change !== undefined && change !== null ? `
                                <p class="text-sm mt-1 ${change >= 0 ? 'text-green-600' : 'text-red-600'}">
                                    ${change >= 0 ? '+' : ''}${change} since last upload
                                </p>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderChangesSummary() {
            if (!changes || (changes.newFollowers.length === 0 && changes.unfollowers.length === 0)) {
                return '';
            }

            return `
                <div class="bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg shadow-lg p-6 mb-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">📊 Changes Since Last Upload</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${changes.newFollowers.length > 0 ? `
                            <div class="bg-white rounded-lg p-4">
                                <h3 class="font-semibold text-green-600 mb-2">✨ New Followers (${changes.newFollowers.length})</h3>
                                <div class="max-h-32 overflow-y-auto">
                                    ${changes.newFollowers.slice(0, 10).map(u => `<p class="text-sm text-gray-700">@${u}</p>`).join('')}
                                    ${changes.newFollowers.length > 10 ? `<p class="text-xs text-gray-500 mt-2">+${changes.newFollowers.length - 10} more</p>` : ''}
                                </div>
                            </div>
                        ` : ''}
                        ${changes.unfollowers.length > 0 ? `
                            <div class="bg-white rounded-lg p-4">
                                <h3 class="font-semibold text-red-600 mb-2">👋 Unfollowers (${changes.unfollowers.length})</h3>
                                <div class="max-h-32 overflow-y-auto">
                                    ${changes.unfollowers.slice(0, 10).map(u => `<p class="text-sm text-gray-700">@${u}</p>`).join('')}
                                    ${changes.unfollowers.length > 10 ? `<p class="text-xs text-gray-500 mt-2">+${changes.unfollowers.length - 10} more</p>` : ''}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderUserList(users, title, emptyMessage, showViewProfile) {
            if (!showViewProfile) showViewProfile = false;
            
            return `
                <div class="bg-white rounded-lg shadow">
                    <div class="p-4 border-b">
                        <h3 class="text-lg font-semibold">${title}</h3>
                        <p class="text-sm text-gray-500 mt-1">${users.length} accounts</p>
                    </div>
                    <div class="p-4 max-h-96 overflow-y-auto">
                        ${users.length === 0 ? `
                            <p class="text-gray-400 text-center py-8">${emptyMessage}</p>
                        ` : `
                            <div class="space-y-2">
                                ${users.map(user => `
                                    <div class="flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg transition">
                                        <a 
                                            href="${user.href}" 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            class="text-blue-600 hover:text-blue-800 font-medium"
                                        >
                                            @${user.username}
                                        </a>
                                        ${showViewProfile ? `
                                            <a
                                                href="https://www.instagram.com/${user.username}"
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                class="text-sm bg-red-50 text-red-600 px-3 py-1 rounded hover:bg-red-100 transition"
                                            >
                                                View Profile
                                            </a>
                                        ` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            const analysis = getAnalysis();
            
            return `
                <div class="p-8">
                    <div class="max-w-7xl mx-auto">
                        <div class="flex items-center justify-between mb-8">
                            <div>
                                <h1 class="text-4xl font-bold text-gray-800">Instagram Dashboard</h1>
                                <p class="text-gray-600 mt-1">Manage your followers and following</p>
                            </div>
                            <button
                                onclick="resetApp()"
                                class="flex items-center gap-2 bg-white px-4 py-2 rounded-lg shadow hover:shadow-md transition"
                            >
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                </svg>
                                Upload New Files
                            </button>
                        </div>

                        ${renderChangesSummary()}

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            ${renderStatCard('Followers', followers.length, 'Users', '#8B5CF6', changes?.followerChange)}
                            ${renderStatCard('Following', following.length, 'TrendingUp', '#EC4899', changes?.followingChange)}
                            ${renderStatCard('Not Following You Back', analysis.notFollowingBack.length, 'UserMinus', '#EF4444')}
                            ${renderStatCard('Mutual Followers', analysis.mutualFollowers.length, 'UserPlus', '#10B981')}
                        </div>

                        ${changes ? `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                <div class="bg-white rounded-lg shadow p-6 border-l-4 border-red-500">
                                    <h3 class="text-lg font-semibold text-gray-700 mb-2">👋 Followers Lost</h3>
                                    <p class="text-4xl font-bold text-red-600">${changes.unfollowers.length}</p>
                                    <p class="text-sm text-gray-500 mt-2">People who unfollowed you</p>
                                </div>
                                <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                                    <h3 class="text-lg font-semibold text-gray-700 mb-2">✨ New Followers</h3>
                                    <p class="text-4xl font-bold text-green-600">${changes.newFollowers.length}</p>
                                    <p class="text-sm text-gray-500 mt-2">People who started following you</p>
                                </div>
                            </div>
                        ` : ''}

                        <div class="bg-white rounded-lg shadow mb-6">
                            <div class="flex border-b">
                                <button
                                    onclick="setTab('overview')"
                                    class="px-6 py-3 font-medium transition ${activeTab === 'overview' ? 'tab-active' : 'tab-inactive'}"
                                >
                                    Not Following You Back
                                </button>
                                <button
                                    onclick="setTab('notFollowed')"
                                    class="px-6 py-3 font-medium transition ${activeTab === 'notFollowed' ? 'tab-active' : 'tab-inactive'}"
                                >
                                    Follow You Only
                                </button>
                                <button
                                    onclick="setTab('mutual')"
                                    class="px-6 py-3 font-medium transition ${activeTab === 'mutual' ? 'tab-active' : 'tab-inactive'}"
                                >
                                    Mutual Followers
                                </button>
                            </div>
                        </div>

                        ${activeTab === 'overview' ? renderUserList(
                            analysis.notFollowingBack,
                            'People You Follow Who Do Not Follow Back',
                            'Everyone you follow follows you back! 🎉',
                            true
                        ) : ''}

                        ${activeTab === 'notFollowed' ? renderUserList(
                            analysis.notFollowedBack,
                            'People Who Follow You Only',
                            'You follow back everyone who follows you!',
                            false
                        ) : ''}

                        ${activeTab === 'mutual' ? renderUserList(
                            analysis.mutualFollowers,
                            'Mutual Followers',
                            'No mutual followers yet',
                            false
                        ) : ''}
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = isLoaded ? renderDashboard() : renderUploadScreen();
        }

        window.handleFileUpload = handleFileUpload;
        window.resetApp = resetApp;
        window.setTab = setTab;

        render();
    </script>
</body>
</html>
