<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Dashboard - History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .nav-active {
            background-color: #8B5CF6;
            color: white;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #8B5CF6, #EC4899);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-50 min-h-screen">
    <!-- Navigation Bar -->
    <nav class="bg-white shadow-md mb-8">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-purple-600">📊 Instagram Tracker</span>
                </div>
                <div class="flex space-x-4">
                    <a href="index.html" class="px-4 py-2 rounded-lg font-medium hover:bg-gray-100 transition">Dashboard</a>
                    <a href="analytics.html" class="px-4 py-2 rounded-lg font-medium hover:bg-gray-100 transition">Analytics</a>
                    <a href="history.html" class="nav-active px-4 py-2 rounded-lg font-medium transition">History</a>
                    <a href="upload.html" class="px-4 py-2 rounded-lg font-medium hover:bg-gray-100 transition">Upload</a>
                </div>
            </div>
        </div>
    </nav>

    <div id="app"></div>

    <script type="module">
        // Password Protection
        const CORRECT_PASSWORD = "chrisfit";
        
        function checkPassword() {
            const storedPassword = sessionStorage.getItem('instagram_tracker_auth');
            if (storedPassword === CORRECT_PASSWORD) {
                return true;
            }
            
            const password = prompt("Enter password to access Instagram Tracker:");
            if (password === CORRECT_PASSWORD) {
                sessionStorage.setItem('instagram_tracker_auth', password);
                return true;
            } else if (password !== null) {
                alert("Incorrect password!");
                checkPassword();
            }
            return false;
        }
        
        if (!checkPassword()) {
            document.body.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; min-height: 100vh;"><p style="font-size: 1.5rem; color: #6B7280;">Access Denied</p></div>';
            throw new Error("Access denied");
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSxtt-88cp4vZlMQz3b1N0BsqNAcTwUyY",
            authDomain: "instagram-tracker-fda0e.firebaseapp.com",
            projectId: "instagram-tracker-fda0e",
            storageBucket: "instagram-tracker-fda0e.firebasestorage.app",
            messagingSenderId: "1021778226136",
            appId: "1:1021778226136:web:01920918c68410b9c6a0ad",
            measurementId: "G-W4RJW473HW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let snapshots = [];
        let isLoading = true;

        async function loadAllSnapshots() {
            try {
                isLoading = true;
                render();

                const q = query(collection(db, "snapshots"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                snapshots = querySnapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                isLoading = false;
                render();
            } catch (error) {
                console.error('Error loading snapshots:', error);
                isLoading = false;
                render();
            }
        }

        function calculateChanges(current, previous) {
            if (!previous) return null;

            const currentFollowers = new Set(current.followers);
            const previousFollowers = new Set(previous.followers);

            const newFollowers = [...currentFollowers].filter(u => !previousFollowers.has(u));
            const unfollowers = [...previousFollowers].filter(u => !currentFollowers.has(u));

            return {
                newFollowers,
                unfollowers,
                followerChange: current.followerCount - previous.followerCount,
                followingChange: current.followingCount - previous.followingCount
            };
        }

        function renderLoading() {
            return `
                <div class="flex items-center justify-center min-h-screen">
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-purple-600 mx-auto mb-4"></div>
                        <p class="text-xl text-gray-600">Loading history...</p>
                    </div>
                </div>
            `;
        }

        function renderNoData() {
            return `
                <div class="p-8">
                    <div class="max-w-4xl mx-auto text-center">
                        <div class="bg-white rounded-xl shadow-lg p-12">
                            <svg class="w-24 h-24 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <h2 class="text-2xl font-bold text-gray-800 mb-2">No History Yet</h2>
                            <p class="text-gray-600 mb-6">Upload your Instagram data on the Dashboard to start tracking history!</p>
                            <a href="index.html" class="inline-block bg-purple-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-purple-700 transition">
                                Go to Dashboard
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHistory() {
            return `
                <div class="p-8">
                    <div class="max-w-5xl mx-auto">
                        <div class="mb-8">
                            <h1 class="text-4xl font-bold text-gray-800">Upload History</h1>
                            <p class="text-gray-600 mt-2">Complete timeline of all your uploads and changes</p>
                        </div>

                        <!-- Summary Stats -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div class="bg-white rounded-lg shadow p-6">
                                <p class="text-gray-500 text-sm font-medium">Total Uploads</p>
                                <p class="text-3xl font-bold text-purple-600 mt-2">${snapshots.length}</p>
                            </div>
                            <div class="bg-white rounded-lg shadow p-6">
                                <p class="text-gray-500 text-sm font-medium">First Upload</p>
                                <p class="text-lg font-bold text-gray-800 mt-2">
                                    ${new Date(snapshots[snapshots.length - 1].timestamp).toLocaleDateString('en-GB', { 
                                        day: 'numeric', 
                                        month: 'short', 
                                        year: 'numeric' 
                                    })}
                                </p>
                            </div>
                            <div class="bg-white rounded-lg shadow p-6">
                                <p class="text-gray-500 text-sm font-medium">Latest Upload</p>
                                <p class="text-lg font-bold text-gray-800 mt-2">
                                    ${new Date(snapshots[0].timestamp).toLocaleDateString('en-GB', { 
                                        day: 'numeric', 
                                        month: 'short', 
                                        year: 'numeric' 
                                    })}
                                </p>
                            </div>
                        </div>

                        <!-- Timeline -->
                        <div class="space-y-6">
                            ${snapshots.map((snapshot, index) => {
                                const date = new Date(snapshot.timestamp);
                                const formattedDate = date.toLocaleDateString('en-GB', {
                                    weekday: 'long',
                                    day: 'numeric',
                                    month: 'long',
                                    year: 'numeric'
                                });
                                const formattedTime = date.toLocaleTimeString('en-GB', {
                                    hour: '2-digit',
                                    minute: '2-digit'
                                });
                                
                                const previous = snapshots[index + 1];
                                const changes = calculateChanges(snapshot, previous);
                                const isLatest = index === 0;
                                
                                return `
                                    <div class="relative pl-8 timeline-item">
                                        <div class="absolute left-0 top-6 w-4 h-4 rounded-full ${isLatest ? 'bg-green-500' : 'bg-purple-500'} border-4 border-white shadow"></div>
                                        
                                        <div class="bg-white rounded-lg shadow-lg p-6 ml-4">
                                            <div class="flex items-center justify-between mb-4">
                                                <div>
                                                    <h3 class="text-xl font-bold text-gray-800">
                                                        ${isLatest ? '🟢 Latest Upload' : `Upload #${snapshots.length - index}`}
                                                    </h3>
                                                    <p class="text-sm text-gray-500">${formattedDate} at ${formattedTime}</p>
                                                </div>
                                                ${isLatest ? '<span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">Current</span>' : ''}
                                            </div>

                                            <!-- Stats Grid -->
                                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                                                <div class="bg-purple-50 rounded-lg p-3">
                                                    <p class="text-xs text-gray-600">Followers</p>
                                                    <p class="text-2xl font-bold text-purple-600">${snapshot.followerCount}</p>
                                                    ${changes ? `
                                                        <p class="text-xs ${changes.followerChange >= 0 ? 'text-green-600' : 'text-red-600'}">
                                                            ${changes.followerChange >= 0 ? '+' : ''}${changes.followerChange}
                                                        </p>
                                                    ` : ''}
                                                </div>
                                                <div class="bg-pink-50 rounded-lg p-3">
                                                    <p class="text-xs text-gray-600">Following</p>
                                                    <p class="text-2xl font-bold text-pink-600">${snapshot.followingCount}</p>
                                                    ${changes ? `
                                                        <p class="text-xs ${changes.followingChange >= 0 ? 'text-green-600' : 'text-red-600'}">
                                                            ${changes.followingChange >= 0 ? '+' : ''}${changes.followingChange}
                                                        </p>
                                                    ` : ''}
                                                </div>
                                                <div class="bg-blue-50 rounded-lg p-3">
                                                    <p class="text-xs text-gray-600">Ratio</p>
                                                    <p class="text-2xl font-bold text-blue-600">
                                                        ${(snapshot.followerCount / snapshot.followingCount).toFixed(2)}
                                                    </p>
                                                </div>
                                                <div class="bg-gray-50 rounded-lg p-3">
                                                    <p class="text-xs text-gray-600">Net</p>
                                                    <p class="text-2xl font-bold text-gray-600">
                                                        ${snapshot.followerCount - snapshot.followingCount}
                                                    </p>
                                                </div>
                                            </div>

                                            ${changes && (changes.newFollowers.length > 0 || changes.unfollowers.length > 0) ? `
                                                <div class="border-t pt-4">
                                                    <h4 class="font-semibold text-gray-700 mb-3">Changes from previous upload:</h4>
                                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        ${changes.newFollowers.length > 0 ? `
                                                            <div class="bg-green-50 rounded-lg p-4">
                                                                <p class="font-medium text-green-700 mb-2">✨ New Followers (${changes.newFollowers.length})</p>
                                                                <div class="space-y-1 max-h-32 overflow-y-auto">
                                                                    ${changes.newFollowers.slice(0, 5).map(u => `
                                                                        <p class="text-sm text-gray-700">@${u}</p>
                                                                    `).join('')}
                                                                    ${changes.newFollowers.length > 5 ? `
                                                                        <p class="text-xs text-gray-500 mt-2">+${changes.newFollowers.length - 5} more</p>
                                                                    ` : ''}
                                                                </div>
                                                            </div>
                                                        ` : ''}
                                                        
                                                        ${changes.unfollowers.length > 0 ? `
                                                            <div class="bg-red-50 rounded-lg p-4">
                                                                <p class="font-medium text-red-700 mb-2">👋 Unfollowers (${changes.unfollowers.length})</p>
                                                                <div class="space-y-1 max-h-32 overflow-y-auto">
                                                                    ${changes.unfollowers.slice(0, 5).map(u => `
                                                                        <p class="text-sm text-gray-700">@${u}</p>
                                                                    `).join('')}
                                                                    ${changes.unfollowers.length > 5 ? `
                                                                        <p class="text-xs text-gray-500 mt-2">+${changes.unfollowers.length - 5} more</p>
                                                                    ` : ''}
                                                                </div>
                                                            </div>
                                                        ` : ''}
                                                    </div>
                                                </div>
                                            ` : !changes ? `
                                                <div class="border-t pt-4">
                                                    <p class="text-sm text-gray-500 italic">This was your first upload</p>
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            if (isLoading) {
                app.innerHTML = renderLoading();
            } else if (snapshots.length === 0) {
                app.innerHTML = renderNoData();
            } else {
                app.innerHTML = renderHistory();
            }
        }

        loadAllSnapshots();
    </script>
</body>
</html>
